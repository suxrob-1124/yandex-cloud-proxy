---
# =============================================================
#  playbooks/rotate_warp.yml
#  Re-register WARP credentials
#  Run: make rotate-warp
# =============================================================

- name: Rotate WARP credentials
  hosts: xray_servers
  become: true
  gather_facts: false

  vars_files:
    - "{{ playbook_dir }}/../inventory/group_vars/all.yml"

  tasks:
    - name: Remove old WARP credentials
      ansible.builtin.file:
        path: "{{ warp_secrets_file | default('/etc/xray-manager/warp.json') }}"
        state: absent

    - name: Re-register WARP
      ansible.builtin.include_role:
        name: warp

    - name: Load Xray secrets
      ansible.builtin.slurp:
        src: "{{ xray_secrets_file }}"
      register: secrets_raw

    - name: Parse secrets
      ansible.builtin.set_fact:
        xray_secrets: "{{ secrets_raw.content | b64decode | from_json }}"

    - name: Load users
      ansible.builtin.slurp:
        src: "{{ users_file }}"
      register: users_raw

    - name: Parse users
      ansible.builtin.set_fact:
        synced_users: "{{ users_raw.content | b64decode | from_json }}"

    - name: Update Xray server config
      ansible.builtin.template:
        src:      "{{ playbook_dir }}/../roles/xray/templates/xray-server.json.j2"
        dest:     "{{ xray_config_dir }}/config.json"
        mode:     "0640"
        owner:    root
        group:    nogroup
        validate: "{{ xray_bin }} run -test -c %s"

    - name: Restart Xray
      ansible.builtin.systemd:
        name:  xray
        state: restarted

    - name: Verify Xray started successfully
      ansible.builtin.systemd:
        name: xray
      register: xray_status
      failed_when: xray_status.status.ActiveState != 'active'

    - name: Summary
      ansible.builtin.debug:
        msg: "✓ WARP credentials updated, Xray restarted"
