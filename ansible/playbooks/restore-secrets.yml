---
# =============================================================
#  playbooks/restore-secrets.yml
#  Restores secrets from local backup to a fresh server
#  Run BEFORE install.yml so xray role skips key generation
#  Run: make resume-server SERVER=edge-01
#
#  Requires: data/backups/{server}/ created by backup.yml
# =============================================================

- name: Restore server secrets
  hosts: xray_servers
  become: true
  gather_facts: false

  vars_files:
    - "{{ playbook_dir }}/../inventory/group_vars/all.yml"

  vars:
    backup_dir: "{{ playbook_dir }}/../../data/backups/{{ inventory_hostname }}"

  tasks:
    - name: Check backup exists
      ansible.builtin.stat:
        path: "{{ backup_dir }}/secrets.json"
      delegate_to: localhost
      become: false
      register: backup_check

    - name: Fail if backup missing
      ansible.builtin.fail:
        msg: >
          No backup found at {{ backup_dir }}/secrets.json.
          Run: make backup-server SERVER={{ inventory_hostname }} first.
      when: not backup_check.stat.exists

    - name: Create manager directory
      ansible.builtin.file:
        path: "{{ manager_dir }}"
        state: directory
        mode: "0700"

    - name: Restore secrets.json
      ansible.builtin.copy:
        src: "{{ backup_dir }}/secrets.json"
        dest: "{{ xray_secrets_file }}"
        mode: "0600"

    - name: Restore users.json
      ansible.builtin.copy:
        src: "{{ backup_dir }}/users.json"
        dest: "{{ users_file }}"
        mode: "0600"

    - name: Restore sub_token
      ansible.builtin.copy:
        src: "{{ backup_dir }}/sub_token"
        dest: "{{ sub_token_file }}"
        mode: "0600"

    - name: Secrets restored
      ansible.builtin.debug:
        msg: "✓ Secrets restored — install will preserve existing user links"
