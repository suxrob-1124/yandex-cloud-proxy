  - "domain:stun.l.google.com"
  - "domain:stun.google.com"
  - "domain:zoom.us"
  - "domain:zoom.com"
  - "domain:zoomgov.com"
  - "domain:teams.microsoft.com"
  - "domain:teams.live.com"
  - "domain:skype.com"
  # Social media and messengers (blocked/throttled in Russia)
  - "domain:instagram.com"
  - "domain:cdninstagram.com"
  - "domain:facebook.com"
  - "domain:fbcdn.net"
  - "domain:twitter.com"
  - "domain:x.com"
  - "domain:twimg.com"
  - "domain:discord.com"
  - "domain:discord.gg"
  - "domain:discordapp.com"
  # Video
  - "domain:youtube.com"
  - "domain:googlevideo.com"
  - "domain:ytimg.com"
  - "domain:ggpht.com"
  # Other geo-restricted
  - "domain:medium.com"
  - "domain:quora.com"
  - "domain:notion.so"
  - "domain:notion.site"
  - "domain:glassdoor.com"
  - "domain:linkedin.com"
