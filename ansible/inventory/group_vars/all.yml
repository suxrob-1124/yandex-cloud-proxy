# =============================================================
#  group_vars/all.yml
#  Variables available to all hosts
#  Secrets (Reality keys) are generated by the install.yml playbook
#  and saved in vars/secrets.yml (in .gitignore)
# =============================================================

# General service parameters
xray_port:         443
sub_port:          8443
# masquerade_host is set per-host in inventory (generated from Terraform)

# Per-user limits (policy level 0)
# bufferSize: 0 = unlimited, >0 = buffer limit in KB per connection
xray_user_conn_idle:  300     # idle connection timeout (sec)
xray_user_uplink_only:  2     # wait time after upload close (sec)
xray_user_downlink_only: 5    # wait time after download close (sec)

# Xray
xray_version:      "latest"
xray_config_dir:   "/usr/local/etc/xray"
xray_log_dir:      "/var/log/xray"
xray_bin:          "/usr/local/bin/xray"

# Nginx — serving client configs
sub_dir:           "/var/www/sub"
ssl_dir:           "/etc/nginx/ssl"

# State manager
manager_dir:       "/etc/xray-manager"
users_file:        "/etc/xray-manager/users.json"
sub_token_file:    "/etc/xray-manager/sub_token"

# SSH
ansible_user:      ubuntu

xray_secrets_file: "/etc/xray-manager/secrets.json"

# WARP (Cloudflare WireGuard)
warp_secrets_file: "/etc/xray-manager/warp.json"
warp_endpoint:     "engage.cloudflareclient.com:2408"

# Chain proxy — settings in ansible/vars/chain.yml (in .gitignore)
# chain_proxy_addr and chain_proxy_port are set there

# Direct bypass — Russian services that must NOT go through WARP/chain
# (they block datacenter and Cloudflare IPs)
direct_domains:
  - "domain:vk.com"
  - "domain:vk.ru"
  - "domain:vkontakte.ru"
  - "domain:vkuserphoto.ru"
  - "domain:vk-analytics.ru"
  - "domain:vk.me"
  - "domain:vkvideo.ru"
  - "domain:yandex.ru"
  - "domain:ya.ru"
  - "domain:mail.ru"
  - "domain:ok.ru"
  - "domain:sberbank.ru"
  - "domain:gosuslugi.ru"

chain_domains:
  # AI services (strict geo-blocking, WARP cannot handle)
  - "domain:openai.com"
  - "domain:chatgpt.com"
  - "domain:ai.com"
  - "domain:anthropic.com"
  - "domain:claude.ai"
  - "domain:gemini.google.com"
  - "domain:bard.google.com"
  - "domain:aistudio.google.com"
  - "domain:generativelanguage.googleapis.com"
  - "domain:perplexity.ai"
  - "domain:midjourney.com"
  - "domain:suno.com"
  - "domain:copilot.microsoft.com"

# WARP — domains via Cloudflare WireGuard (non-Russian IP)
warp_domains:
