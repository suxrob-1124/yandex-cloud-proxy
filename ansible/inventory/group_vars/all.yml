  - "domain:netflix.com"
  - "domain:netflix.net"
  - "domain:nflxvideo.net"
  - "domain:nflximg.net"
  - "domain:nflxso.net"
  - "domain:spotify.com"
  - "domain:scdn.co"
  - "domain:disneyplus.com"
  - "domain:max.com"
  # Video calls (throttled by TSPU, need a proper UDP path)
